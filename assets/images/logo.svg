<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <defs>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="neonColor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bdfaff"/>
      <stop offset="100%" stop-color="#7de8f7"/>
    </linearGradient>
  </defs>

  <g stroke="url(#neonColor)" stroke-width="5" fill="none"
     stroke-linecap="round" stroke-linejoin="round" filter="url(#neon)">

    <!-- Contorno aberto da cabeca e orelhas, baseado no logo de referencia. -->
    <path d="M 80,176
             C 60,170 49,154 47,136
             C 46,122 49,108 53,99
             C 45,80 46,57 56,41
             C 58,37 62,37 69,40
             C 79,44 91,53 97,68"/>
    <path d="M 72,83
             C 86,70 102,64 120,64
             C 138,64 154,70 168,83"/>
    <path d="M 143,68
             C 149,53 161,44 171,40
             C 178,37 182,37 184,41
             C 194,57 195,80 187,99
             C 191,108 194,122 193,136
             C 191,154 180,170 160,176"/>

    <!-- Olhos fechados (crescente feliz) -->
    <path d="M 68,115 C 79,109 94,111 100,122"/>
    <path d="M 140,122 C 146,111 161,109 172,115"/>

    <!-- Nariz arredondado -->
    <path fill="url(#neonColor)" stroke="none"
          d="M 111,136
             C 113,132 127,132 129,136
             C 129,141 124,144 120,145
             C 116,144 111,141 111,136 Z"/>

    <!-- Boca -->
    <path d="M 120,144 C 119,155 108,159 100,148"/>
    <path d="M 120,144 C 121,155 132,159 140,148"/>

    <!-- Bigodes esquerda -->
    <path d="M 28,126 C 40,125 52,126 62,130"/>
    <path d="M 32,140 C 43,139 53,138 62,138"/>

    <!-- Bigodes direita -->
    <path d="M 178,130 C 188,126 200,125 212,126"/>
    <path d="M 178,138 C 187,138 197,139 208,140"/>
  </g>
</svg>
